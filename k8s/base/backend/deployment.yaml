apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/ovidiuvio/relic/backend:latest
          command:
            - /bin/bash
            - -c
            - |
              DB_HOST=$(echo $DATABASE_URL | sed -e 's|.*@||' -e 's|:.*||' -e 's|/.*||')
              DB_USER=$(echo $DATABASE_URL | sed -e 's|.*//||' -e 's|:.*@||')
              echo "Waiting for database at $DB_HOST..."
              until pg_isready -h "$DB_HOST" -U "$DB_USER"; do
                echo "Postgres is unavailable - sleeping"
                sleep 2
              done
              echo "Running migrations..."
              export PYTHONPATH=/app
              python3 -c "from backend.database import init_db; init_db()"
              echo "Migrations complete."
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: relic-app-secrets
                  key: DATABASE_URL
      containers:
        - name: backend
          image: ghcr.io/ovidiuvio/relic/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: relic-app-secrets
                  key: DATABASE_URL
            - name: S3_ENDPOINT_URL
              value: "http://minio.shared.svc.cluster.local:9000"
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: relic-app-secrets
                  key: MINIO_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: relic-app-secrets
                  key: MINIO_SECRET_KEY
            - name: S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: relic-app-secrets
                  key: MINIO_BUCKET
            - name: S3_REGION
              value: "us-east-1"
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: relic-app-secrets
                  key: ALLOWED_ORIGINS
            - name: ADMIN_CLIENT_IDS
              valueFrom:
                secretKeyRef:
                  name: relic-app-secrets
                  key: ADMIN_CLIENT_IDS
            - name: DEBUG
              value: "false"
            - name: BACKUP_ENABLED
              value: "false"
            - name: SKIP_DB_INIT
              value: "true"
          readinessProbe:
            httpGet:
              path: /api/v1/version
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/version
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 500m
