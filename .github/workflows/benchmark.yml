name: Benchmark Suite

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Iterations per benchmark'
        required: false
        default: '5'
      workers:
        description: 'Concurrent workers'
        required: false
        default: '5'
      operations:
        description: 'Operations per iteration'
        required: false
        default: '100'

jobs:
  benchmark:
    runs-on: benchmark
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start stack
        run: |
          docker compose -f docker-compose.prod.yml up -d --build \
            frontend backend postgres minio
        env:
          GIT_HASH: ${{ github.sha }}

      - name: Wait for backend
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost/api/v1/version > /dev/null 2>&1; then
              echo "Backend ready after $((i * 3))s"
              exit 0
            fi
            sleep 3
          done
          docker compose -f docker-compose.prod.yml logs backend
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install httpx jq matplotlib plotly boto3

      - name: Download previous benchmarks from R2
        continue-on-error: true
        run: |
          mkdir -p benchmark-history/
          echo "🔍 Downloading benchmark history from R2 for branch: ${{ github.ref_name }}..."

          python3 scripts/r2_benchmark_storage.py download \
            --branch "${{ github.ref_name }}" \
            --output-dir benchmark-history/ \
            --limit 30
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_REGION: ${{ secrets.R2_REGION }}

      - name: Seed relics for benchmarks
        env:
          RELIC_ADMIN_KEY: 09d85e5f91316a66233d97e1b5936399
        run: |
          echo "Seeding 500 relics for benchmarks..."
          python3 scripts/seed_relics.py \
            --count 500 \
            --workers 10 \
            --url http://localhost \
            --client-key "$RELIC_ADMIN_KEY" \
            --access-level public
          echo "Seed complete"

      - name: Run create benchmark
        env:
          RELIC_ADMIN_KEY: 09d85e5f91316a66233d97e1b5936399
        run: |
          ITERATIONS="${{ github.event.inputs.iterations || 5 }}"
          WORKERS="${{ github.event.inputs.workers || 5 }}"

          mkdir -p benchmark-results/runs

          echo "Running create benchmark: 1000 relics x $ITERATIONS iterations..."

          for i in $(seq 1 $ITERATIONS); do
            echo "=== Create Run $i of $ITERATIONS ==="

            python3 scripts/benchmark_relics.py \
              --count 1000 \
              --workers "$WORKERS" \
              --url http://localhost \
              --client-key "$RELIC_ADMIN_KEY" \
              --output "benchmark-results/runs/create-run-${i}.json" \
              --git-hash "$GITHUB_SHA"

            jq -r '.results.throughput_relics_per_sec' "benchmark-results/runs/create-run-${i}.json" >> /tmp/create_throughputs.txt
            jq -r '.results.latency_ms.p95' "benchmark-results/runs/create-run-${i}.json" >> /tmp/create_p95.txt
          done

          # Calculate median
          median() {
            local arr=($(sort -n))
            local len=${#arr[@]}
            local mid=$((len / 2))
            if (( len % 2 == 0 )); then
              echo "scale=3; (${arr[$mid-1]} + ${arr[$mid]}) / 2" | bc
            else
              echo "${arr[$mid]}"
            fi
          }

          CREATE_MEDIAN_THROUGHPUT=$(cat /tmp/create_throughputs.txt | median)
          CREATE_MEDIAN_P95=$(cat /tmp/create_p95.txt | median)

          echo "Create Median Throughput: $CREATE_MEDIAN_THROUGHPUT relics/sec"
          echo "Create Median P95: ${CREATE_MEDIAN_P95}ms"

          # Save create results as initial JSON for the suite step to merge into
          mkdir -p benchmark-results
          jq -n \
            --argjson tp "$CREATE_MEDIAN_THROUGHPUT" \
            --argjson p95 "$CREATE_MEDIAN_P95" \
            --argjson iters "$ITERATIONS" \
            '{create: {name: "create", iterations: $iters, median: {operations_per_second: $tp, latency_ms: {p95: $p95}}}}' \
            > benchmark-results/results.json

      - name: Run benchmark suite (read, search, spaces, social, mixed)
        id: benchmark
        env:
          RELIC_ADMIN_KEY: 09d85e5f91316a66233d97e1b5936399
        run: |
          ITERATIONS="${{ github.event.inputs.iterations || 5 }}"
          WORKERS="${{ github.event.inputs.workers || 5 }}"
          OPERATIONS="${{ github.event.inputs.operations || 100 }}"

          python3 scripts/run_all_benchmarks.py \
            --url http://localhost \
            --client-key "$RELIC_ADMIN_KEY" \
            --iterations "$ITERATIONS" \
            --workers "$WORKERS" \
            --operations "$OPERATIONS" \
            --output /tmp/suite_results.json \
            --git-hash "$GITHUB_SHA"

          # Merge suite results into the combined file (preserving create results)
          jq -s '.[0] * .[1]' benchmark-results/results.json /tmp/suite_results.json > /tmp/merged.json
          mv /tmp/merged.json benchmark-results/results.json

      - name: Generate summary
        run: |
          echo "## 🔬 Benchmark Suite Results"
          echo ""
          
          # Parse and display each benchmark
          for bench in create read search spaces social mixed; do
            if jq -e ".$bench" benchmark-results/results.json > /dev/null 2>&1; then
              echo "### ${bench^}"
              echo ""
              
              if [ "$bench" = "create" ]; then
                TP=$(jq -r ".create.median.operations_per_second" benchmark-results/results.json)
                P95=$(jq -r ".create.median.latency_ms.p95" benchmark-results/results.json)
                echo "| Metric | Value |"
                echo "|--------|-------|"
                echo "| Median Throughput | **${TP}** relics/sec |"
                echo "| Median P95 Latency | ${P95}ms |"
              else
                TP=$(jq -r ".${bench}.median.operations_per_second // \"N/A\"" benchmark-results/results.json)
                SR=$(jq -r ".${bench}.median.success_rate // \"N/A\"" benchmark-results/results.json)
                P95=$(jq -r ".${bench}.median.latency_ms.p95 // \"N/A\"" benchmark-results/results.json)
                echo "| Metric | Value |"
                echo "|--------|-------|"
                echo "| Throughput | **${TP}** ops/sec |"
                echo "| Success Rate | ${SR}% |"
                echo "| P95 Latency | ${P95}ms |"
              fi
              echo ""
            fi
          done
          
          echo "> Full results in artifact: \`benchmark-results\`"

      - name: Generate trend plots
        run: |
          mkdir -p benchmark-history/
          cp benchmark-results/results.json "benchmark-history/results-${GITHUB_SHA::8}.json"

          python3 scripts/analyze_benchmarks.py \
            --input benchmark-history/ \
            --output benchmark-results/trends/
      
      - name: Display trend summary
        run: |
          if [ -f benchmark-results/trends/SUMMARY.md ]; then
            cat benchmark-results/trends/SUMMARY.md
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.sha }}
          path: benchmark-results/
          retention-days: 90

      - name: Upload benchmark history to R2
        run: |
          echo "📤 Uploading benchmark results to R2 for branch: ${{ github.ref_name }}..."
          python3 scripts/r2_benchmark_storage.py upload \
            --file benchmark-results/results.json \
            --branch "${{ github.ref_name }}" \
            --git-hash "${GITHUB_SHA::8}" \
            --runner-id "${{ runner.name }}"
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_REGION: ${{ secrets.R2_REGION }}

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.prod.yml down
