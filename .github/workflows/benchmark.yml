name: Benchmark - Relic Creation

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      relic_count:
        description: 'Number of relics to create'
        required: false
        default: '1000'
      workers:
        description: 'Number of concurrent workers'
        required: false
        default: '5'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start stack
        run: |
          docker compose -f docker-compose.prod.yml up -d --build \
            frontend backend postgres minio
        env:
          GIT_HASH: ${{ github.sha }}

      - name: Wait for backend
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost/api/v1/version > /dev/null 2>&1; then
              echo "Backend ready after $((i * 3))s"
              exit 0
            fi
            sleep 3
          done
          docker compose -f docker-compose.prod.yml logs backend
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install httpx jq matplotlib

      - name: Download previous benchmarks
        continue-on-error: true
        run: |
          mkdir -p benchmark-history/
          # Try to download latest artifact from previous runs
          if gh run list --workflow=benchmark.yml --branch=${{ github.ref_name }} --limit 1 --json databaseId,status --jq '.[] | select(.status=="completed") | .databaseId' > /tmp/last_run_id.txt 2>/dev/null; then
            LAST_RUN_ID=$(cat /tmp/last_run_id.txt)
            if [ -n "$LAST_RUN_ID" ]; then
              gh run download "$LAST_RUN_ID" --name benchmark-history --dir benchmark-history/ 2>/dev/null || true
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run benchmark (5 iterations)
        id: benchmark
        env:
          RELIC_ADMIN_KEY: 09d85e5f91316a66233d97e1b5936399
        run: |
          COUNT="${{ github.event.inputs.relic_count || 1000 }}"
          WORKERS="${{ github.event.inputs.workers || 5 }}"
          RUNS=5
          
          mkdir -p benchmark-results/runs
          
          echo "Running $RUNS iterations of $COUNT relics with $WORKERS workers..."
          
          for i in $(seq 1 $RUNS); do
            echo ""
            echo "=== Run $i of $RUNS ==="
            
            python3 scripts/benchmark_relics.py \
              --count "$COUNT" \
              --workers "$WORKERS" \
              --url http://localhost \
              --client-key "$RELIC_ADMIN_KEY" \
              --output "benchmark-results/runs/run-${i}.json" \
              --git-hash "$GITHUB_SHA"
            
            # Extract metrics
            jq -r '.results.throughput_relics_per_sec' "benchmark-results/runs/run-${i}.json" >> /tmp/throughputs.txt
            jq -r '.results.success_rate' "benchmark-results/runs/run-${i}.json" >> /tmp/success_rates.txt
            jq -r '.results.duration_seconds' "benchmark-results/runs/run-${i}.json" >> /tmp/durations.txt
            jq -r '.results.latency_ms.p95' "benchmark-results/runs/run-${i}.json" >> /tmp/p95s.txt
          done
          
          echo ""
          echo "=== Calculating median values ==="
          
          # Calculate median (middle value of sorted list)
          median() {
            local arr=($(sort -n))
            local len=${#arr[@]}
            local mid=$((len / 2))
            if (( len % 2 == 0 )); then
              echo "scale=3; (${arr[$mid-1]} + ${arr[$mid]}) / 2" | bc
            else
              echo "${arr[$mid]}"
            fi
          }
          
          MEDIAN_THROUGHPUT=$(cat /tmp/throughputs.txt | median)
          MEDIAN_SUCCESS_RATE=$(cat /tmp/success_rates.txt | median)
          MEDIAN_DURATION=$(cat /tmp/durations.txt | median)
          
          # Extract all latency metrics from each run
          for i in $(seq 1 $RUNS); do
            jq -r '.results.latency_ms.min' "benchmark-results/runs/run-${i}.json" >> /tmp/lat_min.txt
            jq -r '.results.latency_ms.p50' "benchmark-results/runs/run-${i}.json" >> /tmp/lat_p50.txt
            jq -r '.results.latency_ms.p90' "benchmark-results/runs/run-${i}.json" >> /tmp/lat_p90.txt
            jq -r '.results.latency_ms.p95' "benchmark-results/runs/run-${i}.json" >> /tmp/lat_p95.txt
            jq -r '.results.latency_ms.p99' "benchmark-results/runs/run-${i}.json" >> /tmp/lat_p99.txt
            jq -r '.results.latency_ms.max' "benchmark-results/runs/run-${i}.json" >> /tmp/lat_max.txt
          done
          
          MEDIAN_MIN=$(cat /tmp/lat_min.txt | median)
          MEDIAN_P50=$(cat /tmp/lat_p50.txt | median)
          MEDIAN_P90=$(cat /tmp/lat_p90.txt | median)
          MEDIAN_P95=$(cat /tmp/lat_p95.txt | median)
          MEDIAN_P99=$(cat /tmp/lat_p99.txt | median)
          MEDIAN_MAX=$(cat /tmp/lat_max.txt | median)
          
          # Calculate min/max for reference
          MIN_THROUGHPUT=$(sort -n /tmp/throughputs.txt | head -1)
          MAX_THROUGHPUT=$(sort -n /tmp/throughputs.txt | tail -1)
          MIN_P95=$(sort -n /tmp/lat_p95.txt | head -1)
          MAX_P95=$(sort -n /tmp/lat_p95.txt | tail -1)
          
          echo "Median throughput: $MEDIAN_THROUGHPUT relics/sec (range: $MIN_THROUGHPUT - $MAX_THROUGHPUT)"
          echo "Median success rate: $MEDIAN_SUCCESS_RATE%"
          echo "Median duration: ${MEDIAN_DURATION}s"
          echo "Median P95 latency: ${MEDIAN_P95}ms (range: $MIN_P95 - $MAX_P95)"
          
          # Save median values
          echo "$MEDIAN_THROUGHPUT" > /tmp/median_throughput.txt
          echo "$MEDIAN_SUCCESS_RATE" > /tmp/median_success_rate.txt
          echo "$MEDIAN_DURATION" > /tmp/median_duration.txt
          echo "$MEDIAN_P95" > /tmp/median_p95.txt
          echo "$MEDIAN_MIN" > /tmp/median_min.txt
          echo "$MEDIAN_P50" > /tmp/median_p50.txt
          echo "$MEDIAN_P90" > /tmp/median_p90.txt
          echo "$MEDIAN_P99" > /tmp/median_p99.txt
          echo "$MEDIAN_MAX" > /tmp/median_max.txt
          
          # Create combined results file
          jq -n \
            --argjson runs "$(jq -s '.' benchmark-results/runs/*.json)" \
            --arg median_throughput "$MEDIAN_THROUGHPUT" \
            --arg median_success_rate "$MEDIAN_SUCCESS_RATE" \
            --arg median_duration "$MEDIAN_DURATION" \
            --arg median_p95 "$MEDIAN_P95" \
            --arg median_min "$MEDIAN_MIN" \
            --arg median_p50 "$MEDIAN_P50" \
            --arg median_p90 "$MEDIAN_P90" \
            --arg median_p99 "$MEDIAN_P99" \
            --arg median_max "$MEDIAN_MAX" \
            --arg git_hash "$GITHUB_SHA" \
            '{
              runs: $runs,
              median: {
                throughput_relics_per_sec: ($median_throughput | tonumber),
                success_rate: ($median_success_rate | tonumber),
                duration_seconds: ($median_duration | tonumber),
                latency_ms: {
                  min: ($median_min | tonumber),
                  p50: ($median_p50 | tonumber),
                  p90: ($median_p90 | tonumber),
                  p95: ($median_p95 | tonumber),
                  p99: ($median_p99 | tonumber),
                  max: ($median_max | tonumber)
                }
              },
              metadata: {
                git_hash: $git_hash,
                timestamp: (now | todate),
                iterations: 5
              }
            }' > benchmark-results/results.json

      - name: Generate summary
        run: |
          MEDIAN_THROUGHPUT=$(cat /tmp/median_throughput.txt)
          MEDIAN_SUCCESS_RATE=$(cat /tmp/median_success_rate.txt)
          MEDIAN_DURATION=$(cat /tmp/median_duration.txt)
          MEDIAN_P95=$(cat /tmp/median_p95.txt)
          MEDIAN_MIN=$(cat /tmp/median_min.txt)
          MEDIAN_P50=$(cat /tmp/median_p50.txt)
          MEDIAN_P90=$(cat /tmp/median_p90.txt)
          MEDIAN_P99=$(cat /tmp/median_p99.txt)
          MEDIAN_MAX=$(cat /tmp/median_max.txt)
          
          echo "## 🔬 Benchmark Results (Median of 5 runs)"
          echo ""
          echo "| Metric | Value |"
          echo "|--------|-------|"
          echo "| Relics per run | ${{ github.event.inputs.relic_count || 1000 }} |"
          echo "| Workers | ${{ github.event.inputs.workers || 5 }} |"
          echo "| Iterations | 5 |"
          echo "| **Median Throughput** | **${MEDIAN_THROUGHPUT}** relics/sec |"
          echo "| **Median Success Rate** | **${MEDIAN_SUCCESS_RATE}%** |"
          echo "| **Median Duration** | ${MEDIAN_DURATION}s |"
          echo "| **Median P95 Latency** | ${MEDIAN_P95}ms |"
          echo ""
          echo "### Latency Distribution (Median of 5 runs)"
          echo ""
          echo "| Percentile | Latency (ms) |"
          echo "|------------|--------------|"
          echo "| Min | ${MEDIAN_MIN} |"
          echo "| P50 | ${MEDIAN_P50} |"
          echo "| P90 | ${MEDIAN_P90} |"
          echo "| P95 | ${MEDIAN_P95} |"
          echo "| P99 | ${MEDIAN_P99} |"
          echo "| Max | ${MEDIAN_MAX} |"
          echo ""
          echo "> Full results in artifact: \`benchmark-results\`"

      - name: Generate trend plots
        run: |
          # Merge current result with history
          mkdir -p benchmark-history/
          cp benchmark-results/results.json benchmark-history/
          
          python3 scripts/analyze_benchmarks.py \
            --input benchmark-history/ \
            --output benchmark-results/trends/
          
          # Copy history for next run
          cp -r benchmark-results/trends/ benchmark-history/trends/ 2>/dev/null || true
      
      - name: Display trend summary
        run: |
          if [ -f benchmark-results/trends/SUMMARY.md ]; then
            cat benchmark-results/trends/SUMMARY.md
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.sha }}
          path: |
            benchmark-results/
          retention-days: 90

      - name: Upload history for next run
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-history
          path: benchmark-history/
          retention-days: 90

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.prod.yml down
