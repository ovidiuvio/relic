name: PR Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ovidiuvio/relic

jobs:
  # -------------------------------------------------------------------------
  # Build and push PR images (runs on GitHub-hosted runner, not k3d)
  # Skipped when PR is closed.
  # -------------------------------------------------------------------------
  build-images:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ steps.tag.outputs.tag }}
          build-args: |
            VERSION=${{ steps.tag.outputs.tag }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.tag.outputs.tag }}

  # -------------------------------------------------------------------------
  # Deploy to k3d cluster (runs on self-hosted runner inside the cluster)
  # Skipped when PR is closed.
  # -------------------------------------------------------------------------
  deploy:
    if: github.event.action != 'closed'
    needs: build-images
    runs-on: [self-hosted, k3d, linux]
    environment:
      name: pr-${{ github.event.pull_request.number }}
      url: https://pr-${{ github.event.pull_request.number }}.${{ vars.K8S_DOMAIN }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy PR environment
        env:
          K8S_DOMAIN: ${{ vars.K8S_DOMAIN }}
          ADMIN_CLIENT_IDS: ${{ secrets.RELIC_ADMIN_CLIENT_IDS }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          make k8s-deploy \
            K8S_ENV=pr-${{ github.event.pull_request.number }} \
            K8S_VERSION=pr-${{ github.event.pull_request.number }} \
            K8S_DOMAIN=${{ vars.K8S_DOMAIN }}

      - name: Run integration tests
        env:
          K8S_DOMAIN: ${{ vars.K8S_DOMAIN }}
          RELIC_ADMIN_KEY: ${{ secrets.RELIC_ADMIN_CLIENT_IDS }}
        run: |
          pip install httpx pytest pytest-asyncio --quiet
          make k8s-test \
            K8S_ENV=pr-${{ github.event.pull_request.number }} \
            K8S_DOMAIN=${{ vars.K8S_DOMAIN }}

      - name: Post deployment comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const env = 'pr-${{ github.event.pull_request.number }}';
            const domain = '${{ vars.K8S_DOMAIN }}';
            const url = `https://${env}.${domain}`;
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const body = `${emoji} **PR Environment** ${status === 'success' ? 'deployed' : 'deployment failed'}\n\n` +
              (status === 'success' ? `🔗 ${url}\n\nThis environment will be automatically torn down when the PR is closed.` : 'Check the workflow logs for details.');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # -------------------------------------------------------------------------
  # Tear down PR environment when PR is closed (merged or abandoned)
  # -------------------------------------------------------------------------
  teardown:
    if: github.event.action == 'closed'
    runs-on: [self-hosted, k3d, linux]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tear down PR environment
        env:
          K8S_DOMAIN: ${{ vars.K8S_DOMAIN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          make k8s-teardown-clean \
            K8S_ENV=pr-${{ github.event.pull_request.number }} \
            K8S_DOMAIN=${{ vars.K8S_DOMAIN }}

      - name: Post teardown comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const env = 'pr-${{ github.event.pull_request.number }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🗑️ PR environment \`${env}\` has been torn down.`
            });
